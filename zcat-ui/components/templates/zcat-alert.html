<template tag-name="zcat-alert">
    <lyte-messagebox
                                        id="showToast"
                                        lt-prop-yield="true"
                                        lt-prop-show="{{showAlert}}"
                                        lt-prop-type="{{status}}"
                                        lt-prop-offset='{"top":"0"}'
                                        lt-prop-duration="3000"
                                        lt-prop-transition='{"animation":"fadeIn","duration":"0.2s"}'
                                        >
                                        <template is="registerYield" yield-name="messageboxYield">
                                            
                                            <div class="alert-content-outer {{status}}">   
                                                    <div class="zcat-dF zcat-align-center {{header ? 'zcat-gap-6' : 'zcat-gap-4'}} left-alert-content">
                                                        <div class="{{header ? 'zcat-h20 zcat-w20 ': 'zcat-h16 zcat-w16 '}}"> 
                                                            
                                                            <zcat-icon 
                                                                class="zcat-flex-center alert-icon-color"
                                                                name="{{
                                                                    status === 'success' ? 'alert-success' : 
                                                                    status === 'info' ? 'alert-info' :
                                                                    status === 'warning' ? 'alert-warning' :
                                                                    status === 'error' ? 'alert-danger' : ''
                                                                }}" 
                                                                width="{{header ? '20' : '16'}}"
                                                                height="{{header ? '20' : '16'}}"
                                                                stroke="{{
                                                                    status === 'success' ? 'var(--zcat-toast-icon-line-success)' : 
                                                                    status === 'info' ? 'var(--zcat-toast-icon-line-info)' :
                                                                    status === 'warning' ? 'var(--zcat-toast-icon-line-warning)' :
                                                                    status === 'error' ? 'var(--zcat-toast-icon-line-danger)' : ''
                                                                }}"
                                                                strokeWidth="{{zcatProp.header.left.logo.strokeWidth || 1.3}}"
                                                            >
                                                            </zcat-icon>


                                                        </div>
                                                        <div class="zcat-w100p">  
                                                            <p lyte-if="{{header}}" class="zcat-subtitle1 zcat-mb-2 alert-primary-text">{{header}}</p> 
                                                            <p class="{{header ? 'zcat-body3' : 'zcat-body1'}} 
                                                                zcat-body33 alert-secondary-text {{header ? '' : 'no-header'}}" style="white-space: pre-wrap; word-break: break-all; text-indent: -4px;"
                                                            >
                                                            {{desc}}
                                                            </p>                                                                                                
                                                        </div>
                                                    </div>
                                                    <div class="zcat-dF zcat-align-center right-alert-content {{button ? 'min-w25p' : ''}}">  
                                                        <!-- yet to give yield here - if needed   -->
                                                            <zcat-button zcat-prop='{{button}}'                                                            
                                                             self="{{self}}"
                                                             lyte-if="{{button}}"
                                                            >
                                                            </zcat-button>
                                                            <zcat-button self="{{alertThis}}"
                                                                                                zcat-prop='{
                                                                                                    "variant": "ghost",
                                                                                                    "size": "small",
                                                                                                    "color": "grey",
                                                                                                    "type": "navigation",
                                                                                                    "icon": {"position": "right",
                                                                                                    "name": "close",
                                                                                                    "class": "zcat-w16 zcat-h16 zcat-stroke-greybtn-icon"
                                                                                                    }, 
                                                                                                    "callback": {
                                                                                                        "name": "closeToaster"
                                                                                                    }                                                                                                    
                                                                                                }'
                                                                                            >
                                                            </zcat-button>


                                                    </div>

                                            </div> 
                                        </template>
    </lyte-messagebox>


</template>
