<template tag-name="zcat-pagination">
    <div class="zcat-dN">
        <svg xmlns="http://www.w3.org/2000/svg" id="zcat-icon-left-arrow" viewBox="0 0 14 14" fill="none">
            <path d="M8.75 10.5L5.25 7L8.75 3.5" stroke="inherit" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <svg xmlns="http://www.w3.org/2000/svg" id="zcat-icon-right-arrow" viewBox="0 0 14 14" fill="none">
            <path d="M5.25 10.5L8.75 7L5.25 3.5" stroke="var(--zcat-body-icons-static-primary)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>
    <%if(zcatProp.variant === 'primary'){ %>
    <lyte-navigator 
     lt-prop-yield=true
     lt-prop-value={{zcatProp.value}} 
     lt-prop-records={{zcatProp.records}}
     lt-prop-perpage={{zcatProp.perpage}}
     lt-prop-more-records={{zcatProp.morerecords}}
     lt-prop-middle-text={{zcatProp.middletext}}
     lt-prop-show-only-icon={{zcatProp.showonlyicon}}
     lt-prop-show-text={{zcatProp.showtext}}
     lt-prop-aria={{zcatProp.aria}}
     lt-prop-aria-next={{zcatProp.arianext}}
     lt-prop-aria-previous={{zcatProp.ariaprevious}}
     lt-prop-aria-home={{zcatProp.ariahome}}
     lt-prop-aria-end={{zcatProp.ariaend}}
     lt-prop-type="{{zcatProp.type ? 'zcatProp.type' : 'default'}}"
     on-next = "{{method('customLbindForPagination', zcatProp.onNext, '')}}"
     on-previous = "{{method('customLbindForPagination', zcatProp.onPrevious, '')}}"
     on-home = "{{method('customLbindForPagination', zcatProp.onHome, '')}}" 
     on-end = "{{method('customLbindForPagination', zcatProp.onEnd, '')}}" 
     on-select="{{method('customLbindForPagination', zcatProp.onSelect, '')}}"
     >
        <template is = "registerYield" yield-name = "navigatorYield">
        <div class="zcat-pagination-wraper">
            <div class="zcat-dF zcat-gap-6 zcat-align-center zcat-pagination-result-wraper">
                <div class="zcat-pagination-result-text">Showing Results :</div>
                <div class="zcat-flex-center zcat-gap-4">
                    <div class="zcat-pagination-result-count">{{zcatProp.startPage}} - {{zcatProp.endPage}}</div>
                    <div class="zcat-pagination-result-total">of {{zcatProp.records}}</div>
                </div>
            </div>
            <div class="zcat-flex-center zcat-gap-16">
                <div class="zcat-dF zcat-gap-6 zcat-align-center">
                    <div class="zcat-pagination-dropdown-text">Rows per page :</div>
                    <zcat-dropdown self = "{{self}}" zcat-prop = "{{paginationDropdownStyles}}">
                    </zcat-dropdown>
                </div>
                <div class="zcat-pagination-divider"></div>
                <div class="zcat-flex-center zcat-gap-12">
                    <div data-zcqa="{{zcatProp.zcqa}}-prev-btn" class="lyteSingleBack zcat-pagination-icon-wraper zcat-pagination-icon-color zcat-pagination-icon-disabled-color">  
                        <lyte-svg
                        lt-prop-path="#zcat-icon-left-arrow"
                        lt-prop-class="zcat-w14 zcat-h14 zcat-flex-center zcat-pagination-icon-disabled-color"
                      ></lyte-svg> 
                    </div>
                    <div class="zcat-pagination-page-list"> {{zcatProp.startPage}} - {{zcatProp.endPage}} </div>
                    <div data-zcqa="{{zcatProp.zcqa}}-next-btn" class="lyteSingleFront zcat-pagination-icon-wraper zcat-pagination-icon-color zcat-pagination-icon-disabled-color"> 
                        <lyte-svg
                        lt-prop-path="#zcat-icon-right-arrow"
                        lt-prop-class="zcat-w14 zcat-h14 zcat-flex-center"
                      ></lyte-svg> 
                    </div>
                </div>
            </div>
        </div>
       </template>
  </lyte-navigator>
  <%}else if(zcatProp.variant === 'secondary'){%>
    <div class="zcat-pagination-wraper">
        <div class="zcat-dF zcat-gap-6 zcat-align-center zcat-pagination-result-wraper">
            <div class="zcat-pagination-result-text">Total Records :</div>
            <div class="zcat-flex-center zcat-gap-4">
                <div class="zcat-pagination-result-count">50</div>
            </div>
        </div>
    </div>  
    <%}%>

</template>
