<template tag-name="zcat-timezone" class="zcat-timezone-dropdown">

    <zcat-dropdown
     self = "{{self}}" zcat-prop = "{{zcatProp}}"
     key="{{zcatProp.key}}"
     feature-obj="{{timezone}}"
      on-option-selected = "{{method('onTimezoneSelected')}}" 
     >
    </zcat-dropdown>
