  <lyte-table
    lt-prop-infinite-scroll="true"
    scroll-end="{{method('onScrollEnd')}}"
    lt-prop-content="{{zcatProp.body}}"
    lt-prop-yield="true"
    style="{{zcatProp.style}}"
    class="{{zcatProp.rowOnclick.methodName ? 'zcat-clickable-row' : ''}} {{zcatProp.class}} zcat-table"
    lt-prop-scroll='{"horizontal":{{zcatProp.scroll}},"vertical":{{zcatProp.scroll}}}'
    lt-prop-column-sortable = {{zcatProp.sorting}}
    lt-prop-prevent-table-modify = false
    lt-prop-prevent-scrollbar = false 
    lt-prop-sticky-table = true
  >
    <template is="registerYield" yield-name="yield">
      <lyte-table-structure>
        <lyte-thead>
          <lyte-tr>
            <% if(zcatProp.checkbox){%>
              <lyte-th>
                  <div class="zcat-table-header-checkbox">
                    <lyte-checkbox 
                      lt-prop-prevent-callback-observers="true"
                      lt-prop-checked="{{lbind(isAllRowCheckBoxSelect)}}"
                      class="{{isNotAllRowChecked ? 'minus-btn' : ''}}"
                      on-changed="{{method('selectAllOrUnSelectAllObjectRow', zcatProp.body)}}">
                    </lyte-checkbox>
                  </div>
              </lyte-th>
            <% } %>
            <% zcatProp.header.forEach(function(thead, index){ %>
              <lyte-th fixed = {{zcatProp.headerFixed}}>
                <div class="zcat-table-header-content">
                  {{thead.label}} 
                  <%if(thead.table_sorting){%>
                    <lyte-svg onclick="{{action('sortColumn','channel_name')}}" lt-prop-path="#zcat-icon-sort" lt-prop-class="zcat-w20 zcat-h16 {{currentSort.key == 'channel_name' ? (currentSort.direction == 'asc' ? 'sort-asc' : 'sort-desc') : 'sort-desc'}}" class="zcat-flex-center"></lyte-svg>
                  <% } %>
                </div>
                </lyte-th>
              <% }) %>
              <%if(zcatProp.field_type){%>
                <lyte-th fixed = {{zcatProp.headerFixed}}> {{zcatProp.field_type_head}} </lyte-th>
              <% } %>
              <%if(zcatProp.moreOptions.list.length){%>
                <lyte-th class="zcat-table-head-moreOptions" fixed = {{zcatProp.headerFixed}}> {{thead.label}} </lyte-th>
              <% } %>
          </lyte-tr>
        </lyte-thead>
        <lyte-tbody>
          <% ltPropData.forEach(function(row, index){ %> 
            <%if(zcatProp.rowOnclick.methodName){%>
              <lyte-tr class="zcat-cP {{zcatProp.moreOptions.list.length ? 'zcat-pR' : ''}} {{activeMenuIndex == index ? 'row-focused' : ''}}" onclick="{{action('tableRowOnClick',event, row.body)}}">
                <% if(zcatProp.checkbox){%>
                  <lyte-td>
                    <!-- <div class="zcat-table-body-content-wraper">
                      <lyte-checkbox lt-prop-prevent-callback-observers="true" class="option"
                      lt-prop-checked="{{lbind(isAllRowSelect)}}" on-changed="{{method('selectOrUnselectObjectRow',row.body)}}"></lyte-checkbox>
                    </div> -->
                      <!-- <div class="zcat-table-body-content-wraper" data-name="{{row.body.isAllRowSelect}}">
                        <lyte-checkbox lt-prop-prevent-callback-observers="true"
                        lt-prop-checked="{{lbind(row.body.isAllRowSelect)}}" on-changed="{{method('selectOrUnselectObjectRow',row.body)}}"></lyte-checkbox>
                      </div> -->
                    <div class="zcat-table-body-content-wraper">
                      <lyte-checkbox 
                        lt-prop-prevent-callback-observers="true"
                        lt-prop-checked="{{lbind(row.body.isAllRowSelect)}}"
                        on-changed="{{method('selectOrUnselectObjectRow', row.body)}}">
                      </lyte-checkbox>
                    </div>
                  </lyte-td>                                                                                  
                  <% zcatProp.header.forEach(function(thead, index){ %> 
                    <% if(thead.yield){%>
                      <lyte-td>
                        <div class="zcat-table-body-content-wraper">
                          <lyte-yield yield-name="{{thead.yield}}" row-data="{{row.body}}"> </lyte-yield>
                        </div>
                      </lyte-td>
                    <% }else {%>
                      <lyte-td>
                        <div class="zcat-table-body-content-wraper">
                          <div lyte-if="{{thead.avatar}}" class="zcat-dF zcat-align-center zcat-gap-6">
                            <zcat-avatar zcat-prop = "{{tableAvatarDetails}}" self = "{{self}}">
                            </zcat-avatar>
                            <lyte-text class="zcat-table-body-content-ellipsis"
                              lt-prop-value="{{getNestedValue(row.body, thead.value)}}"

                              lt-prop-tooltip-config='{ "position" : "bottom" }'>
                            </lyte-text>
                          </div>
                          <lyte-text lyte-else class="zcat-table-body-content-ellipsis"
                              lt-prop-value="{{getNestedValue(row.body, thead.value)}}"
                              lt-prop-tooltip-config='{ "position" : "bottom" }'>
                          </lyte-text>
                        </div>
                      </lyte-td>
                    <% } %> 
                  <% }) %>

                  <%if(zcatProp.field_type){%>
                    <lyte-td>
                      <div class="zcat-table-body-content-wraper">
                        <lyte-yield yield-name="{{thead.yield}}" row-data="{{row.body}}">
                          <% if(zcatProp.field_type === 'status'){%>
                          <zcat-label self = "{{self}}" zcat-prop = {{tableStatusObj}}>
                          </zcat-label>
                          <%}else if(zcatProp.field_type === 'link'){%>
                          <zcat-link-button self = "{{self}}" zcat-prop = {{tableLinkButtonObj}}>
                          </zcat-link-button>
                          <%}else if(zcatProp.field_type === 'button'){%>
                          <zcat-button self = "{{self}}" zcat-prop = {{tableBtnStyles}}>
                          </zcat-button>
                          <%}else if(zcatProp.field_type === 'badge'){%>
                          <zcat-label self = "{{self}}" zcat-prop = {{tableLabelObj}}>
                          </zcat-label>
                          <%}else if(zcatProp.field_type === 'toggle'){%>
                            <!-- <zcat-checkbox zcat-prop = "{{tableCheckboxDetails}}" self = "{{self}}">
                            </zcat-checkbox> -->
                            <lyte-checkbox lt-prop-type="switch" lt-prop-tabindex="0" lt-prop-value="1"></lyte-checkbox>
                          <%}else if(zcatProp.field_type === 'radio'){%>
                              <% if(index === 0){ %>
                                <zcat-radio zcat-prop="{{tableRadioDetails}}" self="{{self}}"></zcat-radio>
                              <% } else if(index === 1){ %>
                                <zcat-radio zcat-prop="{{tableRadioDetails1}}" self="{{self}}"></zcat-radio>
                              <% } else if(index === 2){ %>
                                <zcat-radio zcat-prop="{{tableRadioDetails2}}" self="{{self}}"></zcat-radio>
                              <% } else if(index === 3){ %>
                                <zcat-radio zcat-prop="{{tableRadioDetails3}}" self="{{self}}"></zcat-radio>
                              <% } else if(index === 4){ %>
                                <zcat-radio zcat-prop="{{tableRadioDetails4}}" self="{{self}}"></zcat-radio>
                              <% } else if(index === 5){ %>
                                <zcat-radio zcat-prop="{{tableRadioDetails5}}" self="{{self}}"></zcat-radio>
                              <% } %>
                          <%}else if(zcatProp.field_type === 'icon_text'){%>
                            <div class="zcat-flex-center zcat-gap-6">
                              <lyte-svg lt-prop-path="#zcat-icon-sparcle" lt-prop-class="zcat-w14 zcat-h14" class="zcat-flex-center"></lyte-svg>
                              <lyte-text class="zcat-table-body-content-ellipsis"
                                lt-prop-value="Item Name"
                                lt-prop-tooltip-config='{ "position" : "bottom" }'>
                              </lyte-text>
                            </div>
                          <%}else if(zcatProp.field_type === 'svg'){%>
                            <lyte-svg lt-prop-path="#zcat-icon-file" lt-prop-class="zcat-w16 zcat-h16" class="zcat-flex-center"></lyte-svg>
                          <%}%>
                        </lyte-yield>
                      </div>
                    </lyte-td>
                  <%}%>

                  <%if(zcatProp.moreOptions.list.length){%>
                    <lyte-td class="table-toolkit-wraper">
                      <div class="zcat-table-body-content-wraper">
                        <div class="table-toolkit {{zcatProp.moreOptions.list.disabled ? 'zcat-table-toolki-wraper-disabled' : ''}}" id="zcat_open_menu_{{zcatProp.id}}_{{index}}" onclick="{{action('tableToolkitOpen', index, row.body, zcatProp)}}">
                          <div class="table-toolkit-three-dots">
                            <lyte-svg lt-prop-path="#zcat-icon-three-dots" lt-prop-class="zcat-w20 zcat-h16 zcat-stroke-dark1" class="zcat-flex-center"></lyte-svg>
                          </div>
                          <lyte-menu
                            on-close="{{method('tableToolkitClose')}}"
                            lt-prop-yield="true"
                            lt-prop-position='downAlignLeft'
                            lt-prop-query="#zcat_open_menu_{{zcatProp.id}}_{{index}}"
                            ltPropPreventDefaultSelection="false"
                          >
                              <template is="registerYield" yield-name="yield">
                                  <lyte-menu-body>
                                      <lyte-menu-item class="{{item.disabled ? 'zcat-table-toolkit-disabled' : ''}}" lyte-for="{{zcatProp.moreOptions.list}} as item index" onclick="{{action('tableMoreOptionCallback', item, row.body)}}">
                                        <div class="zcat-dF zcat-align-center zcat-gap-6">
                                          <lyte-svg
                                            lyte-if="{{item.icon.position === 'left'}}"
                                            lt-prop-path="#{{item.icon.name}}"
                                            lt-prop-class="{{item.icon.class}} zcat-flex-center"
                                          ></lyte-svg>
                                          <p class="zcat-text-14 zcat-color-dark1">{{item.label}}</p>
                                          <lyte-svg
                                            lyte-if="{{item.icon.position === 'right'}}"
                                            lt-prop-path="#{{item.icon.name}}"
                                            lt-prop-class="{{item.icon.class}} zcat-flex-center"
                                          ></lyte-svg>
                                        </div>
                                      </lyte-menu-item>
                                  </lyte-menu-body>
                              </template>
                          </lyte-menu>
                        </div>
                      </div>
                    </lyte-td>
                  <%}%>
                <%}else{%>
                  <% zcatProp.header.forEach(function(thead, index){ %> 
                    <% if(thead.yield){%>
                      <lyte-td>
                        <div class="zcat-table-body-content-wraper">
                          <lyte-yield yield-name="{{thead.yield}}" row-data="{{row.body}}"> </lyte-yield>
                        </div>
                      </lyte-td>
                    <% }else {%>
                      <lyte-td>
                        <!-- <div class="zcat-table-body-content-wraper">
                          <lyte-text id="descText" class="zcat-table-body-content"
                          lt-prop-value="{{row.body[thead.value]}}"
                          lt-prop-tooltip-config='{ "position" : "bottom" }'>
                        </lyte-text>
                        </div> -->
                        <!-- <div class="zcat-table-body-content-ellipsis">{{row.body[thead.value]}}</div> -->
                         <div class="zcat-table-body-content-wraper">
                            <div lyte-if="{{thead.avatar}}" class="zcat-dF zcat-align-center zcat-gap-6">
                              <zcat-avatar zcat-prop = "{{tableAvatarDetails}}" self = "{{self}}">
                              </zcat-avatar>
                              <lyte-text class="zcat-table-body-content-ellipsis"
                                lt-prop-value="{{getNestedValue(row.body, thead.value)}}"
                                lt-prop-tooltip-config='{ "position" : "bottom" }'>
                              </lyte-text>
                            </div>
                            <lyte-text lyte-else class="zcat-table-body-content-ellipsis"
                                lt-prop-value="{{getNestedValue(row.body, thead.value)}}"
                                lt-prop-tooltip-config='{ "position" : "bottom" }'>
                            </lyte-text>
                         </div>
                      </lyte-td>
                    <% } %>
                  <% }) %>
                  
                  <%if(zcatProp.field_type){%>
                    <lyte-td>
                      <div class="zcat-table-body-content-wraper">
                        <lyte-yield yield-name="{{thead.yield}}" row-data="{{row.body}}">
                          <% if(zcatProp.field_type === 'status'){%>
                          <zcat-label self = "{{self}}" zcat-prop = {{tableStatusObj}}>
                          </zcat-label>
                          <%}else if(zcatProp.field_type === 'link'){%>
                          <zcat-link-button self = "{{self}}" zcat-prop = {{tableLinkButtonObj}}>
                          </zcat-link-button>
                          <%}else if(zcatProp.field_type === 'badge'){%>
                          <zcat-label self = "{{self}}" zcat-prop = {{tableLabelObj}}>
                          </zcat-label>
                          <%}else if(zcatProp.field_type === 'button'){%>
                            <zcat-button self = "{{self}}" zcat-prop = {{tableBtnStyles}}>
                            </zcat-button>
                          <%}else if(zcatProp.field_type === 'toggle'){%>
                             <lyte-checkbox lt-prop-type="switch" lt-prop-tabindex="0" lt-prop-value="1"></lyte-checkbox>
                          <%}else if(zcatProp.field_type === 'radio'){%>
                              <% if(index === 0){ %>
                                <zcat-radio zcat-prop="{{tableRadioDetails}}" self="{{self}}"></zcat-radio>
                              <% } else if(index === 1){ %>
                                <zcat-radio zcat-prop="{{tableRadioDetails1}}" self="{{self}}"></zcat-radio>
                              <% } else if(index === 2){ %>
                                <zcat-radio zcat-prop="{{tableRadioDetails2}}" self="{{self}}"></zcat-radio>
                              <% } else if(index === 3){ %>
                                <zcat-radio zcat-prop="{{tableRadioDetails3}}" self="{{self}}"></zcat-radio>
                              <% } else if(index === 4){ %>
                                <zcat-radio zcat-prop="{{tableRadioDetails4}}" self="{{self}}"></zcat-radio>
                              <% } else if(index === 5){ %>
                                <zcat-radio zcat-prop="{{tableRadioDetails5}}" self="{{self}}"></zcat-radio>
                              <% } %>
                          <%}else if(zcatProp.field_type === 'icon_text'){%>
                            <div class="zcat-flex-center zcat-gap-6">
                              <lyte-svg lt-prop-path="#zcat-icon-sparcle" lt-prop-class="zcat-w14 zcat-h14" class="zcat-flex-center"></lyte-svg>
                              <lyte-text class="zcat-table-body-content-ellipsis"
                                lt-prop-value="Item Name"
                                lt-prop-tooltip-config='{ "position" : "bottom" }'>
                              </lyte-text>
                            </div>
                          <%}else if(zcatProp.field_type === 'svg'){%>
                            <lyte-svg lt-prop-path="#zcat-icon-file" lt-prop-class="zcat-w16 zcat-h16" class="zcat-flex-center"></lyte-svg>
                          <%}%>
                        </lyte-yield>
                      </div>
                    </lyte-td>
                  <%}%>

                  <%if(zcatProp.moreOptions.list.length){%>
                    <lyte-td class="table-toolkit-wraper">
                      <div class="zcat-table-body-content-wraper">
                        <div class="table-toolkit {{zcatProp.moreOptions.list.disabled ? 'zcat-table-toolki-wraper-disabled' : ''}}" id="zcat_open_menu_{{zcatProp.id}}_{{index}}" onclick="{{action('tableToolkitOpen', index, row.body, zcatProp)}}">

                            <lyte-svg lt-prop-path="#zcat-icon-three-dots" lt-prop-class="zcat-w20 zcat-h16 zcat-stroke-dark1" class="zcat-flex-center"></lyte-svg>
                          </div> 
                          <lyte-menu
                            on-close="{{method('tableToolkitClose')}}"
                            lt-prop-yield="true"
                            lt-prop-position='downAlignLeft'
                            lt-prop-query="#zcat_open_menu_{{zcatProp.id}}_{{index}}"
                            ltPropPreventDefaultSelection="false"

                                  <lyte-menu-body>
                                     <div lyte-for="{{zcatProp.moreOptions.list}} as item index" class="{{item.disabled ? 'zcat-table-toolkit-disabled' : ''}}">
                                      <lyte-menu-item onclick="{{action('tableMoreOptionCallback', item, row.body)}}">
                                        <div class="zcat-dF zcat-align-center zcat-gap-6">
                                          <lyte-svg
                                            lyte-if="{{item.icon.position === 'left'}}"
                                            lt-prop-path="#{{item.icon.name}}"
                                            lt-prop-class="{{item.icon.class}} {{item.disabled ? 'zcat-icon-stroke-disabled' : ''}} zcat-flex-center"
                                          ></lyte-svg>
                                          <p class="zcat-text-14 zcat-color-dark1">{{item.label}}</p>
                                          <lyte-svg
                                            lyte-if="{{item.icon.position === 'right'}}"
                                            lt-prop-path="#{{item.icon.name}}"
                                            lt-prop-class="{{item.icon.class}} {{item.disabled ? 'zcat-icon-stroke-disabled' : ''}} zcat-flex-center"
                                          ></lyte-svg>
                                        </div>
                                      </lyte-menu-item>
                                    </div>
                                  </lyte-menu-body>
                              </template>
                          </lyte-menu>
                        </div>
                      </div>
                    </lyte-td>
                  <%}%>
                <%}%>
              </lyte-tr>
            <%} else{%>
              <lyte-tr class="{{zcatProp.moreOptions.list.length ? 'zcat-pR' : ''}} {{activeMenuIndex == index ? 'row-focused' : ''}}">

                    <lyte-checkbox
                      lt-prop-prevent-callback-observers="true"

                    ></lyte-checkbox>

                <%}else{%>

                        </div>
                      </lyte-td>
                    <% }else {%>
                      <lyte-td>
                        <div class="zcat-table-body-content-wraper">
                          <div lyte-if="{{thead.avatar}}" class="zcat-dF zcat-align-center zcat-gap-6">
                            <zcat-avatar zcat-prop = "{{tableAvatarDetails}}" self = "{{self}}">
                            </zcat-avatar>
                            <lyte-text class="zcat-table-body-content-ellipsis"
                              lt-prop-value="{{getNestedValue(row.body, thead.value)}}"
                              lt-prop-tooltip-config='{ "position" : "bottom" }'>
                            </lyte-text>
                          </div>
                          <lyte-text lyte-else class="zcat-table-body-content-ellipsis"
                              lt-prop-value="{{getNestedValue(row.body, thead.value)}}"
                              lt-prop-tooltip-config='{ "position" : "bottom" }'>
                          </lyte-text>
                        </div>
                      </lyte-td>
                    <% } %> 
                  <% }) %>
                <%}%>
                <%if(zcatProp.moreOptions.list.length){%>
                  <lyte-td class="table-toolkit-wraper">
                    <div class="zcat-table-body-content-wraper">
                      <div class="table-toolkit {{zcatProp.moreOptions.list.disabled ? 'zcat-table-toolki-wraper-disabled' : ''}}" id="zcat_open_menu_{{zcatProp.id}}_{{index}}" onclick="{{action('tableToolkitOpen', index, row.body, zcatProp)}}">

                        </div> 
                        <lyte-menu
                          on-close="{{method('tableToolkitClose')}}"

                          lt-prop-position='downAlignLeft'

                          ltPropPreventDefaultSelection="false"
                        >
                            <template is="registerYield" yield-name="yield">
                                <lyte-menu-body>
                                    <lyte-menu-item lyte-for="{{zcatProp.moreOptions.list}} as item index" onclick="{{action('tableMoreOptionCallback', item, row.body)}}">
                                      <div class="zcat-dF zcat-align-center zcat-gap-6">
                                        <lyte-svg
                                          lyte-if="{{item.icon.position === 'left'}}"
                                          lt-prop-path="#{{item.icon.name}}"
                                          lt-prop-class="{{item.icon.class}} zcat-flex-center"
                                        ></lyte-svg>
                                        <p class="zcat-text-14 zcat-color-dark1">{{item.label}}</p>
                                        <lyte-svg
                                          lyte-if="{{item.icon.position === 'right'}}"
                                          lt-prop-path="#{{item.icon.name}}"
                                          lt-prop-class="{{item.icon.class}} zcat-flex-center"
                                        ></lyte-svg>
                                      </div>
                                    </lyte-menu-item>
                                </lyte-menu-body>
                            </template>
                        </lyte-menu>
                      </div>
                    </div>
                  </lyte-td>
                <%}%>
              </lyte-tr>
            <%}%> 
          <% }) %>
        </lyte-tbody>
      </lyte-table-structure>
    </template>
  </lyte-table>

     lt-prop-more-records={{data.morerecords}}
     lt-prop-middle-text={{data.middletext}}
     lt-prop-show-only-icon={{data.showonlyicon}}
     lt-prop-show-text={{data.showtext}}

     lt-prop-aria-end={{data.ariaend}}
     lt-prop-type="{{data.type ? 'data.type' : 'default'}}"
     on-next = "{{method('customLbindForPagination', data.onNext, '')}}"
     on-previous = "{{method('customLbindForPagination', data.onPrevious, '')}}"
     on-home = "{{method('customLbindForPagination', data.onHome, '')}}" 
     on-end = "{{method('customLbindForPagination', data.onEnd, '')}}" 
     on-select="{{method('customLbindForPagination', data.onSelect, '')}}"
     >
        <template is = "registerYield" yield-name = "navigatorYield">

            </div>
            <div class="zcat-flex-center zcat-gap-16">

                <div class="zcat-pagination-divider"></div>
                <div class="zcat-flex-center zcat-gap-12">
                    <div class="lyteSingleBack zcat-pagination-icon-wraper zcat-pagination-icon-color zcat-pagination-icon-disabled-color">  
                        <lyte-svg
                        lt-prop-path="#zcat-icon-left-arrow"
                        lt-prop-class="zcat-w14 zcat-h14 zcat-flex-center zcat-pagination-icon-disabled-color"
                      ></lyte-svg> 
                    </div>
                    <div class="zcat-pagination-page-list"> {{data.startPage}} - {{data.endPage}} </div>
                    <div class="lyteSingleFront zcat-pagination-icon-wraper zcat-pagination-icon-color zcat-pagination-icon-disabled-color"> 
                        <lyte-svg
                        lt-prop-path="#zcat-icon-right-arrow"
                        lt-prop-class="zcat-w14 zcat-h14 zcat-flex-center"
                      ></lyte-svg> 
                    </div>
                </div>
            </div>
        </div>
       </template>
  </lyte-navigator>
