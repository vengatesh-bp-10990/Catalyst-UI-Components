            <div class="timeline-icon" lyte-if="{{item.icon_name}}">
                <lyte-svg
                lt-prop-path="#{{item.icon_name}}"
                lt-prop-class="zcat-w12 zcat-h12 zcat-flex-center"
                ></lyte-svg>
            </div>
            <div lyte-else class="timeline-dot"></div>
            <div class="timeline-content">
