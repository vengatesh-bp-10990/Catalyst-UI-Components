<template tag-name="zcat-label">
  <div
    lyte-if="{{zcatProp.type == 'icon'}}"
    class="zcat-dF zcat-align-center zcat-gap-4"
  >
    <lyte-svg
      lt-prop-path="#{{zcatProp.icon.name}}"
      lt-prop-class="{{zcatProp.icon.class}} zcat-flex-center"
    ></lyte-svg>
    <p class="zcat-text-14 zcat-color-dark1 zcat-text-capitalize">
      {{zcatProp.label}}
    </p>
  </div>
  <div
    lyte-if="{{zcatProp.type == 'dot'}}"
    class="zcat-dF zcat-align-center zcat-gap-4"
  >
    <div class="zcat-dot-{{zcatProp.color}}"></div>
    <p class="zcat-text-14 zcat-color-dark1 zcat-text-capitalize">
      {{zcatProp.label}}
    </p>
  </div>
  <div
    lyte-if="{{zcatProp.type == 'badge'}}"
    class="zcat-badge-{{zcatProp.color}} zcat-text-10 zcat-font-600 zcat-text-capitalize"
  >
    {{zcatProp.label}}
  </div>
