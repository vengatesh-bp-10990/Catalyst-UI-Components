<template tag-name="zcat-fileupload">
  <zcat-hovercard
    lyte-if="{{zcatProp.infoIcon.yield || zcatProp.infoIcon.value}}"
    zcat-prop="{{zcatProp.infoIcon}}"
  >
    <template is="yield" yield-name="{{zcatProp.infoIcon.yield}}">
      <lyte-yield yield-name="{{zcatProp.infoIcon.yield}}"></lyte-yield>
    </template>
  </zcat-hovercard>
  <div
    lyte-if="{{zcatProp.label}}"
    class="zcat-dF zcat-align-center zcat-gap-2 zcat-mb-2 {{zcatProp.disabled ? 'input-field-disabled' : ''}}"
  >
    <p
    class="{{zcatProp.label_class ? zcatProp.label_class : 'zcat-input-label'}} zcat-input-label-default" 
    >
      {{zcatProp.label}}
      <span class="optional-label">{{zcatProp.isOptional && zcatProp.label ? ' (Optional)' : ''}}</span>
    </p>
    <div    
      lyte-if="{{zcatProp.infoIcon.id}}"
      class="zcat-w12 zcat-h12 zcat-cP"
      id="tooltipInfoMsg{{zcatProp.infoIcon.id}}" 
      lyte-hovercard="true"
    >
      <!-- <lyte-svg lt-prop-path="#zcat-icon-info" lt-prop-class="zcat-w12 zcat-h12 zcat-input-label-stroke zcat-mb-2"></lyte-svg> -->
      <zcat-icon 
              class="zcat-mb-2 zcat-input-label-stroke"
              name="info" 
              width="12"
              height="12"
              stroke="var(--zcat-inputField-icon-label)"
              strokeWidth="1.3"
        >
        </zcat-icon>
    </div>
  </div>

    lt-prop-chunk-size="{{zcatProp.chunkSize}}"

    lt-prop-retry-text="{{zcatProp.retryText}}"

    on-before-remove="{{method('defaultOnBeforeRemove')}}"
    on-remove="{{method('defaultOnRemove')}}"

    on-select="{{method('defaultOnSelect')}}"

    <template is="registerYield" yield-name="file">
      <lyte-file-select-area>
        <lyte-file-message
          class="lyteInputFileUpd {{if(queueList.length, 'lyteHide', '')}}"
        >
          <zcat-icon 
            width="16"
            height="16"
            stroke="var(--zcat-inputField-icon-placeholder)"
            name="{{zcatProp.loading ? 'loading-sun' : 'upload-cloud'}}"
          >
          </zcat-icon>
          <span class="placeholder">
          {{
            zcatProp.loading
              ? (zcatProp.loadingPlaceholder ? zcatProp.loadingPlaceholder : "Hold on your file has been uploading")
              : (zcatProp.placeholder ? zcatProp.placeholder + (zcatProp.isOptional && !zcatProp.label ? " (Optional)" : "") : "Drag and drop, or browse to upload your file")
          }}
          </span>
        </lyte-file-message>
        <div class="lyteFileUpdList">
          <%queueList.forEach(function(item,index){%>
          <div class="lyteInputFileUpd {{item.status}}">
            <div class="zcat-dF zcat-gap-4 zcat-align-center">

                height="16"

                name="{{uploadedIcon}}"
              >

            </div>
            <div class="zcat-p-4 zcat-dF zcat-align-center">

              </lyte-file-close>
            </div>
          </div>
          <%if(item.status=="error"){%>
          <lyte-file-retry data-value="{{item.id}}">
            <span class="lyteFileUpdFailMsg">
              {{zcatProp.failureMessage}}
            </span>
            <span class="lyteFileUpdRetryMsg"> {{zcatProp.retryText}} </span>
          </lyte-file-retry>
          <%}%> <%})%>
        </div>
      </lyte-file-select-area>
    </template>
