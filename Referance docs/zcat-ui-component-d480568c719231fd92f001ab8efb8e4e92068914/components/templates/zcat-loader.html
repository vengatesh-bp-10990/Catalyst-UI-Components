    <div class="skeleton-loader-row">

    <div class="skeleton-loader-row">

      <div class="skeleton-loader-column"></div>
      <div class="skeleton-loader-column"></div>
      <div class="skeleton-loader-column"></div>
    </div>
    <div class="skeleton-loader-row">
      <div class="skeleton-loader-column"></div>
      <div class="skeleton-loader-column"></div>
      <div class="skeleton-loader-column"></div>
      <div class="skeleton-loader-column"></div>
    </div>
    <div class="skeleton-loader-row">

      <div class="skeleton-loader-column"></div>
      <div class="skeleton-loader-column"></div>
