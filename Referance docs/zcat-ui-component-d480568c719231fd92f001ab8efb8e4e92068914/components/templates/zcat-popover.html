                stroke="inherit" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>

    </div>
    <lyte-beta-popover
    id="popover"
                                            lt-prop-origin-elem="#{{zcatProp.id}}"
                                            class="main-popover" 
                                            lt-prop-show-close-button = "false"
                                            lt-prop-type = "box"
                                            lt-prop-allow-multiple = true
                                            lt-prop-wrapper-class="lyte-popover-wrapper"
                                            lt-prop-auto-show="true"
                                            lt-prop-placement = "bottomRight top"
                                            on-close="{{method('onDefaultClose', 'lyte_popover_item_' + data.id)}}"
                                            on-show="{{method('defaultOnShow')}}"
                                        >
                                            <template is='registerYield' yield-name='popover'>
                                                <lyte-popover-header lyte-if="{{zcatProp.isSearchable}}"> 
                                                    <div class="header-search-parent">
                                                        <lyte-search
                                                        data-zcqa="{{zcatProp.isSearchable.zcqa}}"
                                                            on-search="{{method('onDropdownSearch', zcatProp.onSearch)}}"
                                                            lt-prop-query-selector='{"scope" : "lyte-drop-box.checkboxBoxClass", "search" : "lyte-popover-item"}'
                                                            lt-prop-placeholder="Search"
                                                            lt-prop='{"closeIcon" : true}'
                                                            class="{{zcatProp.size === 'small' || zcatProp.size == 'extra-small' ? 'lyteSm' : ''}}"
                                                        ></lyte-search> 
                                                    </div>             
                                                </lyte-popover-header>
                                                <lyte-popover-content 
                                                    class="{{zcatProp.size == 'small' ? 'lyteSm' : zcatProp.size == 'extra-small' ? 'lyteExsm' : ''}} 
                                                    {{zcatProp.isSearchable ? 'zcat-pt-6' : ''}} 
                                                    {{zcatProp.createNewBtn ? 'zcat-pb-6': ''}}"
                                                >

                                                    <h4 class="zcat-mb-6" lyte-if="{{zcatProp.dropLabel}}">{{zcatProp.dropLabel}}</h4>

                                                    <div lyte-for="{{zcatProp.options}} as data index" class="zcat-dF zcat-align-item">
                                                        <lyte-popover-item data-value="{{data.value}}"
                                                        data-zcqa="{{data.zcqa}}-{{index}}"
                                                        id="lyte_popover_item_{{data.id}}"
                                                        onmouseenter="{{action('setHoverClass', 'lyte_popover_item_' + data.id)}}"
                                                        onmouseleave="{{action('removeHoverClass', 'lyte_popover_item_' + data.id)}}"
                                                        aria-selected="{{data.selected ? 'true' : 'false'}}"
                                                        selected="{{data.selected ? 'true' : 'false'}}"
                                                        onclick="{{action('handleDropItemClick', 'lyte_popover_item_' + data.id , data.value, data.itemOnClick)}}"
                                                        class="{{data.nestedPopover ? 'nested-popover-item' : ''}} 
                                                        {{data.disabled ? 'popover-item-disabled' : ''}}"
                                                        >
                                                            <div lyte-if="{{data.icon}}">
                                                                <div class="zcat-dF zcat-align-center zcat-gap-4">
                                                                <!-- <lyte-svg lt-prop-path="#{{data.icon.name}}" lt-prop-class="zcat-stroke-icon-active 
                                                                    {{zcatProp.size === 'small' || zcatProp.size === 'extra-small' ? 'zcat-h12 zcat-w12' : 'zcat-h14 zcat-w14'}}" 
                                                                    class="menu-lyte-svg-class {{zcatProp.size === 'small' || zcatProp.size === 'extra-small' ? 'zcat-h12 zcat-w12' : 'zcat-h14 zcat-w14'}}">
                                                                </lyte-svg> -->
                                                                <zcat-icon 
                                                                    class="menu-lyte-svg-class zcat-stroke-icon-active"
                                                                    name="{{data.icon.name}}" 
                                                                    width="{{zcatProp.size === 'small' || zcatProp.size === 'extra-small' ? '12' : '14'}}"
                                                                    height="{{zcatProp.size === 'small' || zcatProp.size === 'extra-small' ? '12' : '14'}}"
                                                                    stroke="var(--zcat-menuList-icon-active)"
                                                                    strokeWidth="{{item.icon.strokeWidth || 1.3}}"
                                                                >
                                                                </zcat-icon>
                                                                <p class="zcat-body1">{{data.name}}</p>
                                                                </div>
                                                            </div>
                                                            <div class="zcat-body1" lyte-else>
                                                                {{data.name}}                    
                                                            </div>
                                                            <!-- <lyte-svg                                                        
                                                                lyte-if="{{data.nestedPopover}}"
                                                                lt-prop-path="#zcat-icon-rightArrow" 
                                                                lt-prop-class="zcat-h14 zcat-w14 zcat-stroke-icon-active"
                                                                class="zcat-w14 zcat-h14"
                                                            >
                                                            </lyte-svg> -->
                                                            <zcat-icon                                                        
                                                                lyte-if="{{data.nestedPopover}}"
                                                                    class="zcat-stroke-icon-active"
                                                                    name="arrow-right" 
                                                                    width="14"
                                                                    height="14"
                                                                    stroke="var(--zcat-menuList-icon-active)"
                                                                    strokeWidth="{{item.icon.strokeWidth || 1.3}}"
                                                                >
                                                                </zcat-icon>
                                                        </lyte-popover-item>
                                                        <template is="yield" yield-name="{{data.yield}}">
                                                            <lyte-yield yield-name="{{data.yield}}"></lyte-yield>
                                                        </template>
                                                    </div>

                                                    <div lyte-if="{{zcatProp.isLoading}}" class="lyteDropdownText">
                                                        Loading ...
                                                    </div>
                                                    <div lyte-if="{{!searchResultsFound}}" class="lyteDropdownText">
                                                        {{zcatProp.noResult ? zcatProp.noResult : 'No Result Found'}}
                                                    </div>


                                                </lyte-popover-content>
                                                <lyte-popover-footer class='right'   
                                                    lyte-if="{{zcatProp.createNewBtn.label}}"
                                                >
                                                    <div  class="lyte-drop-footer"             
                                                    lyte-if="{{zcatProp.createNewBtn.label}}"
                                                    style="border-top: 1px solid var(--zcat-menuList-border-default);"
                                                    >                
                                                        <zcat-button self = "{{self}}" zcat-prop = '{
                                                        "label": "{{zcatProp.createNewBtn.label ? zcatProp.createNewBtn.label : "Create New"}}",
                                                        "variant": "ghost",
                                                            "size": "default",
                                                            "color": "primary",
                                                            "icon": {
                                                            "position": "left",
                                                            "name": "zcat-icon-plus",
                                                            "class": "zcat-w16 zcat-h16 zcat-stroke-ghost-primarybtn-icon"
                                                            },
                                                            "width": "zcat-w100p",
                                                            "ltPropClassCss": "btn-radius-top0", 
                                                            "callback": {
                                                                "name": "{{zcatProp.createNewBtn.callback.name}}"
                                                            }
                                                        }'
                                                        >
                                                        </zcat-button>            
                                                    </div>
                                                </lyte-popover-footer>
                                            </template>
                                        </lyte-beta-popover>

                                        <div lyte-for="{{zcatProp.options}} as eachOptionsData index">
                                        <lyte-beta-popover
                                            id="popover-1"
                                            lt-prop-origin-elem="#lyte_popover_item_{{eachOptionsData.id}}"
                                            class="sub-popover-{{eachOptionsData.id}}" 
                                            lt-prop-show-close-button = "false"

                                                            lt-prop-query-selector='{"scope" : "lyte-drop-box.checkboxBoxClass", "search" : "lyte-popover-item"}'
                                                            lt-prop-placeholder="Search"
                                                            lt-prop='{"closeIcon" : true}'
                                                            class="{{eachOptionsData.size === 'small' || eachOptionsData.size == 'extra-small' ? 'lyteSm' : ''}}"
                                                        ></lyte-search> 
                                                    </div>             
                                                </lyte-popover-header>
                                                <lyte-popover-content 
                                                    class="{{eachOptionsData.size == 'small' ? 'lyteSm' : eachOptionsData.size == 'extra-small' ? 'lyteExsm' : ''}} 
                                                    {{eachOptionsData.isSearchable ? 'zcat-pt-6' : ''}} 
                                                    {{eachOptionsData.createNewBtn ? 'zcat-pb-6': ''}}"
                                                >

                                                    <h4 class="zcat-mb-6" lyte-if="{{eachOptionsData.dropLabel}}">{{eachOptionsData.dropLabel}}</h4>

                                                    <div lyte-for="{{eachOptionsData.options}} as eachOptionsData_data index">
                                                        <lyte-popover-item data-value="{{eachOptionsData_data.value}}"
                                                        data-zcqa="{{eachOptionsData_data.zcqa}}-{{index}}"
                                                        id="lyte_popover_item_{{eachOptionsData_data.id}}"
                                                        onmouseenter="{{action('setHoverClass', 'lyte_popover_item_' + eachOptionsData_data.id)}}"
                                                        onmouseleave="{{action('removeHoverClass', 'lyte_popover_item_' + eachOptionsData_data.id)}}"
                                                        aria-selected="{{eachOptionsData_data.selected ? 'true' : 'false'}}"
                                                        selected="{{eachOptionsData_data.selected ? 'true' : 'false'}}"
                                                        onclick="{{action('handleDropItemClick', 'lyte_popover_item_' + eachOptionsData_data.id , eachOptionsData_data.value, eachOptionsData_data.itemOnClick)}}"
                                                        classss="{{data.nestedPopover ? 'nested-popover-item' : ''}}"
                                                        class="{{eachOptionsData_data.nestedPopover ? 'nested-popover-item' : ''}} 
                                                        {{data.disabled ? 'popover-item-disabled' : ''}}"    
                                                        >
                                                        <!--the above class added sept6-->
                                                            <div lyte-if="{{eachOptionsData_data.icon}}">
                                                                <div class="zcat-dF zcat-align-center zcat-gap-4">
                                                                <!-- <lyte-svg lt-prop-path="#{{eachOptionsData_data.icon.name}}" lt-prop-class="zcat-stroke-icon-active 
                                                                    {{zcatProp.size === 'small' || zcatProp.size === 'extra-small' ? 'zcat-h12 zcat-w12' : 'zcat-h14 zcat-w14'}}" 
                                                                    class="menu-lyte-svg-class {{zcatProp.size === 'small' || zcatProp.size === 'extra-small' ? 'zcat-h12 zcat-w12' : 'zcat-h14 zcat-w14'}}">
                                                                </lyte-svg> -->
                                                                <zcat-icon 
                                                                    class="menu-lyte-svg-class zcat-stroke-icon-active"
                                                                    name="{{eachOptionsData_data.icon.name}}" 
                                                                    width="{{zcatProp.size === 'small' || zcatProp.size === 'extra-small' ? '12' : '14'}}"
                                                                    height="{{zcatProp.size === 'small' || zcatProp.size === 'extra-small' ? '12' : '14'}}"
                                                                    stroke="var(--zcat-menuList-icon-active)"
                                                                    strokeWidth="{{eachOptionsData_data.icon.strokeWidth || 1.3}}"
                                                                >
                                                                </zcat-icon>
                                                                <p>{{eachOptionsData_data.name}}</p>
                                                                </div>
                                                            </div>
                                                            <div lyte-else>
                                                                {{eachOptionsData_data.name}}                    
                                                            </div>
                                                        </lyte-popover-item>
                                                        <template is="yield" yield-name="{{eachOptionsData_data.yield}}">
                                                            <lyte-yield yield-name="{{eachOptionsData_data.yield}}"></lyte-yield>
                                                        </template>
                                                        <!-- <lyte-svg                                                        
                                                            lyte-if="{{eachOptionsData_data.nestedPopover}}"
                                                            lt-prop-path="#zcat-icon-downArrow" 
                                                            lt-prop-class="zcat-h14 zcat-w14"
                                                            class="zcat-w14 zcat-h14"
                                                        >
                                                        </lyte-svg> -->
                                                        <zcat-icon                                                        
                                                                lyte-if="{{eachOptionsData_data.nestedPopover}}"
                                                                    class="zcat-stroke-icon-active"
                                                                    name="arrow-down" 
                                                                    width="14"
                                                                    height="14"
                                                                    stroke="var(--zcat-menuList-icon-active)"
                                                                    strokeWidth="1.3"
                                                                >
                                                                </zcat-icon>
                                                    </div>

                                                    <div lyte-if="{{eachOptionsData.isLoading}}" class="lyteDropdownText">
                                                        Loading ...
                                                    </div>
                                                    <div lyte-if="{{!searchResultsFound}}" class="lyteDropdownText">
                                                        {{eachOptionsData.noResult ? eachOptionsData.noResult : 'No Result Found'}}
                                                    </div>


                                                </lyte-popover-content>
                                                <lyte-popover-footer class='right'  
                                                    lyte-if="{{zcatProp.createNewBtn.label}}"
                                                >
                                                    <div  class="lyte-drop-footer"             
                                                    lyte-if="{{eachOptionsData.createNewBtn.label}}"
                                                    style="border-top: 1px solid var(--zcat-menuList-border-default);"
                                                    >                
                                                        <zcat-button self = "{{self}}" zcat-prop = '{
                                                        "label": "{{eachOptionsData.createNewBtn.label ? eachOptionsData.createNewBtn.label : "Create New"}}",
                                                        "variant": "ghost",
                                                            "size": "default",
                                                            "color": "primary",
                                                            "icon": {
                                                            "position": "left",
                                                            "name": "zcat-icon-plus",
                                                            "class": "zcat-w16 zcat-h16 zcat-stroke-ghost-primarybtn-icon"
                                                            },
                                                            "width": "zcat-w100p",
                                                            "ltPropClassCss": "btn-radius-top0", 
                                                            "callback": {
                                                                "name": "{{eachOptionsData.createNewBtn.callback.name}}"
                                                            }
                                                        }'
                                                        >
                                                        </zcat-button>            
                                                    </div>
                                                </lyte-popover-footer>
                                            </template>
                                        </lyte-beta-popover>
                                        </div>

</template>
