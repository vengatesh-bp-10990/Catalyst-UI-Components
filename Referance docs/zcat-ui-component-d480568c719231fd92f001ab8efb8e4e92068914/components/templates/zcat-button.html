            <lyte-menu-item
              lyte-for="{{ zcatProp.menu.list }} as item index"
              onclick="{{action('customLbindForMenuClick', item)}}"
              data-zcqa="{{item.zcqa}}"
            >
            <%if(item.yield){%>
              <lyte-yield yield-name="{{item.yield}}"></lyte-yield>
            <%}else{%>
              <div class="zcat-dF zcat-align-center
              {{zcatProp.size === 'large' || zcatProp.size === 'default' ? 'zcat-gap-6' :
              zcatProp.size === 'small' ? 'zcat-gap-4' :
              zcatProp.size === 'extra-small' ? 'zcat-gap-2' : 
              ''
              }}
              ">
                <zcat-icon 
                  lyte-if="{{item.icon.position === 'left'}}"
                    class="zcat-flex-center "
                    name="{{item.icon.name}}" 
                    width="{{zcatProp.size === 'default' ? '16' :
                    zcatProp.size === 'small' ? '14' :
                    zcatProp.size === 'extra-small' ? '12' :
                      ''
                    }}"
                    height="{{zcatProp.size === 'default' ? '16' :
                    zcatProp.size === 'small' ? '14' :
                    zcatProp.size === 'extra-small' ? '12' :
                      ''
                    }}"
                    stroke="{{item.icon.stroke}}"
                    strokeWidth="{{item.icon.strokeWidth}} ? '{{item.icon.strokeWidth}}' : 1.3"
                    >
                </zcat-icon>
                <p class="zcat-text-14 zcat-color-dark1">{{item.label}}</p>
               <zcat-icon 
                  lyte-if="{{item.icon.position === 'right'}}"
                    class="zcat-flex-center "
                    name="{{item.icon.name}}" 
                    width="{{zcatProp.size === 'default' ? '16' :
                    zcatProp.size === 'small' ? '14' :
                    zcatProp.size === 'extra-small' ? '12' :
                      ''
                    }}"
                    height="{{zcatProp.size === 'default' ? '16' :
                    zcatProp.size === 'small' ? '14' :
                    zcatProp.size === 'extra-small' ? '12' :
                      ''
                    }}"
                    stroke="{{item.icon.stroke}}"
                    strokeWidth="{{item.icon.strokeWidth}} ? '{{item.icon.strokeWidth}}' : 1.3"
                    >
                </zcat-icon>
              </div>
            <%}%>
            </lyte-menu-item>
          </lyte-menu-body>
        </template>
      </lyte-menu>
    <%}%>

</template>
