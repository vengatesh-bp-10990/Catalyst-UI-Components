    <zcat-button self = "{{self}}" zcat-prop = "{{darwerBtnStyles}}">

    <lyte-drawer style="display: none;" on-before-show="{{method('getProfileDetails')}}" lt-prop-wrapper-class="zcat-profile-drawer-wrapper" lt-prop-layout="overlay" lt-prop-yield=true lt-prop-position="left">
        <template is="registerYield" yield-name="drawerPanel">
            <lyte-drawer-body>
                    <lyte-drawer-item data-value="userprofile"> 
                        <div class="zcat-dF zcat-direction-column zcat-align-center zcat-text-center userprofile rightpanel-section">
                            <!-- <div class="account-img zcat-mb-16">
                                 <lyte-svg lt-prop-path="#zcat-icon-men" lt-prop-class="zcat-w60 zcat-h60 zcat-dF"></lyte-svg>
                            </div> -->
                            <div class="account-img zcat-mb-16">
                                <lyte-svg lt-prop-path="#zcat-icon-profile-icon" lt-prop-class="zcat-w80 zcat-h80 zcat-dF"></lyte-svg>
                            </div>
                            <div class="zcat-dF zcat-align-center zcat-direction-column zcat-gap-8 zcat-w100p">
                                <lyte-text
                                class="zcat-profile-name zcat-dB"
                                lt-prop-value="{{zcatProp.first_name}} {{zcatProp.last_name}}"
                                lt-prop-tooltip-config='{ "position" : "bottom" }'
                                >
                                </lyte-text>
                                <lyte-text
                                class="zcat-profile-email"
                                lt-prop-value="{{zcatProp.email_id}}"
                                lt-prop-tooltip-config='{ "position" : "bottom" }'
                                >
                                </lyte-text>
                                <span class="zcat-profile-email">User ID : {{zcatProp.zuid}}</span>
                                <zcat-link-button self ="{{self}}" zcat-prop = {{profileMenulinkButtonObj}}>
                                </zcat-link-button>
                                <div class="zcat-dF zcat-align-center zcat-gap-6">
                                    <div class="zcat-profile-email">My Organisation:</div>
                                    <zcat-dropdown self = "{{self}}" zcat-prop = "{{dropdownObj}}">
                                    </zcat-dropdown>
                                </div>
                            </div>
                        </div> 
                    </lyte-drawer-item>
                    <lyte-drawer-item data-value="documentations"> 
                        <div class="rightpanel-section br-none-imp">
                            <h4 class="zcat-profile-head">Appearance</h4> 
                            <div class="zcat-dF zcat-align-center zcat-gap-16">
                                <div>
                                     <zcat-cards zcat-prop="{{lightModeCardDetails}}" self="{{self}}">
                                        <template is="yield" yield-name="light_mode_content">
                                            <div class="zcat-theme-card">
                                                <lyte-svg lt-prop-path="#zcat-icon-lightMode" lt-prop-class="zcat-w90 zcat-h62 zcat-dF"></lyte-svg>
                                                <div class="zcat-theme-card-text">Light</div>
                                            </div>
                                        </template>
                                        <template is="yield" yield-name="dark_mode_content">
                                            <div class="zcat-theme-card">
                                                <lyte-svg lt-prop-path="#zcat-icon-darkMode" lt-prop-class="zcat-w90 zcat-h62 zcat-dF"></lyte-svg>
                                                <div class="zcat-theme-card-text">Dark</div>
                                            </div>
                                        </template>
                                        <template is="yield" yield-name="auto_mode_content">
                                            <div class="zcat-theme-card">
                                                <lyte-svg lt-prop-path="#zcat-icon-autoMode" lt-prop-class="zcat-w90 zcat-h62 zcat-dF"></lyte-svg>
                                                <div class="zcat-theme-card-text">Auto</div>
                                            </div>
                                        </template>
                                    </zcat-cards>
                                </div>
                                <!-- <div>
                                    <zcat-cards zcat-prop="{{darkModeCardDetails}}" self="{{self}}">
                                        
                                    </zcat-cards>
                                </div>
                                <div>
                                    <zcat-cards zcat-prop="{{autoModeCardDetails}}" self="{{self}}">
                                        
                                    </zcat-cards>
                                </div> -->
                            </div>
                        </div>
                    </lyte-drawer-item>
                    <lyte-drawer-item data-value="signout">
                        <div class="rightpanel-footer">
                            <div class="rightpanel-section br-none-imp" style="border-top: 1px solid var(--zcat-profileMenu-border-default);">
                                <h4 class="zcat-profile-head">Help</h4> 
                                <div class="zcat-dF zcat-align-center zcat-gap-40">
                                    <zcat-link-button self = "{{self}}" zcat-prop = {{DocsLinkButtonObj}}>
                                    </zcat-link-button>
                                    <zcat-link-button self = "{{self}}" zcat-prop = {{contSuplinkButtonObj}}>
                                    </zcat-link-button>
                                </div>
                            </div>
                            <div class="zcat-flex-center zcat-pt-16 zcat-pb-16">
                                <!-- <a data-zcqa="signOut_btn" class="primarybtn signoutbtn zcat-dIB" href='/baas/logout' style="margin: 0;">Sign Out</a> -->
                                <zcat-button self = "{{self}}" zcat-prop = "{{signoutBtnStyles}}">
                                </zcat-button>
                            </div>
                        </div>
                    </lyte-drawer-item>
            </lyte-drawer-body>
        </template>
    </lyte-drawer>
