<template tag-name="zcat-attention">
    <div class="zcat-dN">
        <svg id="zcat-icon-info" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12" fill="none">
            <g clip-path="url(#clip0_4609_722)">
                <path d="M6 8V6M6 4H6.005M11 6C11 8.76142 8.76142 11 6 11C3.23858 11 1 8.76142 1 6C1 3.23858 3.23858 1 6 1C8.76142 1 11 3.23858 11 6Z" stroke="inherit" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </g>
            <defs>
                <clipPath id="clip0_4609_722">
                <rect width="12" height="12" fill="white"/>
                </clipPath>
            </defs>
        </svg>
    </div>
    <div class="zcat-attention-container zcat-atten-{{zcatProp.type}}">
        <div class="zcat-dF zcat-direction-column zcat-gap-6 zcat-w100p">
            <div class="zcat-dF zcat-align-center zcat-gap-4">
                <lyte-svg lt-prop-path="#{{zcatProp.icon_name}}" lt-prop-class="{{zcatProp.icon_class}}"></lyte-svg>
                <lyte-text
                class="zcat-text-14 {{zcatProp.desc ? 'zcat-font-semibold' : 'zcat-font-regular'}} zcat-attention-head zcat-w100p"
                lt-prop-value="{{zcatProp.name}}"
                >
                </lyte-text>
            </div>
            <%if(zcatProp.desc){%>
                <lyte-text
                class="zcat-attention-desc zcat-w100p"
                lt-prop-value="{{zcatProp.desc}}"
                >
                </lyte-text>
            <%}%>
        </div>
    </div>
</template>
