      lyte-if="{{isSidebarShrinked}}"
      data-value="{{item.value}}"
      >
      </div>
      <div 
      data-value="{{item.value}}" 
        lyte-if="{{item.label && !isSidebarShrinked}}"
        class="{{zcatProp.is_lyte_service ? 'cata_main_menu dropArrow ca-font-inter-reg pR' : 'cata_main_menu dropArrow ca-font-reg pR'}}"
      >
        {{item.label}}

      </div>
      <ul
        class="{{zcatProp.is_lyte_service ? 'cata_sub_menu mT10 ca-font-inter-reg' : 'cata_sub_menu mT10 ca-font-lgt'}} zcat-dF zcat-direction-column zcat-gap-14">
        <li onclick="{{action('onClickNavItem', children.value, item.value, this)}}" data-value="{{children.value}}"
         lyte-for="{{item.children}} as children index"         
        >
          <a class="zcat-feature">
            <!-- <lyte-svg lt-prop-path="#{{children.leadingIcon.name}}" lt-prop-class="{{children.leadingIcon.class}}"
              class="zcat-w16 zcat-h16">

              width="{{children.leadingIcon.width ? children.leadingIcon.width : '16'}}"

            </span>

        </li>
