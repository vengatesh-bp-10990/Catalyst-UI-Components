  <div class="body-wrapper">
    <div
      data-name="{{zcatProp.id}}"
      class="{{zcatProp.header.tabsSecondary || zcatProp.header.tabsPrimary ? 'header-border' : ''}} 
        {{zcatProp.header.tabsSecondary ? 'secondary-tab-height' : ''}}
        "
      lyte-if="{{zcatProp.header}}"
    >
      <div
        class="zcat-form-header sub-header-outer {{zcatProp.header.tabsSecondary || zcatProp.header.tabsPrimary ? '' : 'header-border'}}
          
          "
      >
        <div
          class="zcat-left-alignment 
            {{zcatProp.header.tabsSecondary ? 'zcat-w33p' : 'zcat-w50p'}}"
        >
          <div
            lyte-if="{{zcatProp.header.left.logo}}"
            class="zcat-dF zcat-gap-6 zcat-align-center zcat-cP"
            onclick="{{action('defaultOnTitleClick', zcatProp.header.left.title.value)}}"
            data-zcqa="{{zcatProp.header.left.logo.zcqa}}"
          >
            <!-- <lyte-svg lt-prop-path="#{{zcatProp.header.left.logo.name}}" class="zcat-w24 zcat-h24" lt-prop-class="zcat-w24 zcat-h24 {{zcatProp.header.left.logo.classs}}"></lyte-svg> -->
            <zcat-icon
              class="zcat-flex-center"
              name="{{zcatProp.header.left.logo.name}}"
              width="24"
              height="24"
              stroke="{{zcatProp.header.left.logo.stroke}}"
              strokeWidth="{{zcatProp.header.left.logo.strokeWidth || 1.3}}"
            >
            </zcat-icon>

            <h5 title="{{zcatProp.header.left.title.name}}">
              {{zcatProp.header.left.title.name}}
            </h5>
          </div>

          <div class="zcat-dF zcat-align-center zcat-gap-6" lyte-else>
            <%if(zcatProp.header.left.frontYield){%>
            <lyte-yield
              yield-name="{{zcatProp.header.left.frontYield}}"
            ></lyte-yield>
            <%}%>
            <!-- back button  -->
            <%if(zcatProp.header.left.backArrow){%>
            <zcat-button
              self="{{self}}"
              zcat-prop='
                  {
                    "variant": "ghost",
                    "zcqa": "{{zcatProp.header.left.backArrow.zcqa}}",
                    "size": "small",
                    "color": "grey",
                    "type": "navigation",
                    "icon": {
                      "position": "right",
                      "name": "arrow-left"
                    }, 
                    "callback": {
                      "name": "{{zcatProp.header.left.backArrow.callback.name}}"
                    }
                  }
                '
            ></zcat-button>
            <% } %>

            <div lyte-if="{{zcatProp.header.left.avatar}}">
              <zcat-avatar
                zcat-prop="{{zcatProp.header.left.avatar}}"
                self="{{self}}"
              >
              </zcat-avatar>
            </div>
            <h5 title="{{zcatProp.header.left.title.name}}">
              {{zcatProp.header.left.title.name}}
            </h5>

            <%if(zcatProp.header.left.info){%>
            <!-- <lyte-svg 
                    lyte-hovercard = "true" 
                    id = "tooltipInfoMsghovercardId"
                    lt-prop-path="#zcat-icon-info" lt-prop-class="zcat-w12 zcat-h12 zcat-stroke-dark2" 
                    class="zcat-w12 zcat-h12 zcat-dF subheader-info"
                >
                </lyte-svg> -->

            <zcat-icon
              lyte-hovercard="true"
              id="tooltipInfoMsghovercardId"
              class="zcat-dF subheader-info"
              name="info"
              width="12"
              height="12"
              stroke="var(--zcat-body-icons-static-secondary)"
              strokeWidth="{{zcatProp.header.left.logo.strokeWidth || 1.3}}"
            >
            </zcat-icon>

            <zcat-hovercard
              class="zcat-dN"
              zcat-prop='
                    {
                      "id": "hovercardId",
                      "value": "{{zcatProp.header.left.info.tooltip}}"
                    }
                  '
            >
            </zcat-hovercard>
            <%}%> <%if(zcatProp.header.left.refresh){%>
            <zcat-button
              self="{{self}}"
              zcat-prop='
                    {
                      "variant": "ghost",
                      "zcqa": "{{zcatProp.header.left.refresh.zcqa}}",
                      "size": "small",
                      "color": "primary",
                      "type": "navigation",
                      "icon": {
                        "position": "right",
                        "name": "refresh"
                      }, 
                      "callback": {
                        "name": "{{zcatProp.header.left.refresh.callback.name}}"
                      }
                    }                  
                  '
            >
            </zcat-button>
            <%}%> <%if(zcatProp.header.left.badge){%>
            <zcat-label
              self="{{self}}"
              zcat-prop="{{zcatProp.header.left.badge}}"
            >
            </zcat-label>
            <%}%> <%if(zcatProp.header.left.yield){%>
            <lyte-yield
              yield-name="{{zcatProp.header.left.yield}}"
            ></lyte-yield>
            <%}%>
          </div>
          <p
            lyte-if="{{zcatProp.header.left.desc.name}}"
            class="zcat-text-12 zcat-color-dark2 zcat-mt-4"
          >
            {{zcatProp.header.left.desc.name}}
          </p>
        </div>

        <%if(zcatProp.header.tabsSecondary){%>
        <div
          class="{{zcatProp.header.tabsSecondary ? 'zcat-w33p' : 'zcat-w50p'}} zcat-flex-center"
        >
          <div class="zcat-subheader-tabs zcat-secondary-tab">
            <% zcatProp.header.tabsSecondary.list.forEach((item, index) => { %>
            <go-to
              lt-prop-route="{{item.route}}"
              lt-prop-dp="{{item.dynamicParams}}"
              lt-prop-qp="{{item.queryParams}}"
              lt-prop-class="zcat-link zcat-text-12"
              lt-prop-custom=""
              data-value="{{item.value}}"
              onclick="{{action('tabClick', item, item.callback.name, zcatProp.tabsSecondary.level)}}"
            >
              <a 
                data-zcqa="{{item.zcqa}}-{{index}}"
                data-name="{{item.value}}"
                data-group="lv_{{zcatProp.tabs.level}}"
                >{{item.label}}</a
              >
            </go-to>
            <%}) %>
          </div>
        </div>
        <%}%>

        <div
          class="zcat-right-alignment {{zcatProp.header.tabsSecondary ? 'zcat-w33p' : 'zcat-w50p'}}"
        >
          <%if(zcatProp.header.right.yield){%>
          <lyte-yield yield-name="{{zcatProp.header.right.yield}}"></lyte-yield>
          <%}%> <%if(zcatProp.header.right.defButton){%>
          <zcat-button
            self="{{self}}"
            zcat-prop='
                    {
                      "variant": "grey",
                      "zcqa": "{{zcatProp.header.right.defButton.zcqa}}",
                      "size": "small",
                      "color": "primary",
                      "label": "{{zcatProp.header.right.defButton.label}}", 
                      "callback": {
                        "name": "{{zcatProp.header.right.defButton.callback.name}}"
                      }
                    }                  
                  '
          >
          </zcat-button>
          <%}%> <%if(zcatProp.header.right.moreButton.popoverObj.id){%>
          <zcat-button
            self="{{selfButton}}"
            zcat-prop='
                    {
                      "id": "{{zcatProp.header.right.moreButton.popoverObj.id}}",
                      "zcqa": "{{zcatProp.header.right.moreButton.popoverObj.zcqa}}",
                      "variant": "grey",
                      "size": "small",
                      "color": "grey",
                      "icon": {
                        "position": "right",
                        "name": "three-dots"
                      },
                      "callback": {
                        "name": "openPopover"
                      }
                    }                  
                  '
          >
          </zcat-button>
          <zcat-popover
            class="zcat-dN"
            self="{{self}}"
            zcat-prop="{{zcatProp.header.right.moreButton.popoverObj}}"
          ></zcat-popover>
          <%}%> <%if(zcatProp.header.right.help){%>
          <zcat-button
            self="{{self}}"
            zcat-prop='
                    {
                      "label": "Help",
                      "zcqa": "{{zcatProp.header.right.help.zcqa}}",
                      "variant": "ghost",
                      "size": "small",
                      "color": "primary",
                      "icon": {
                        "position": "left",
                        "name": "help"
                      } , 
                      "callback": {
                        "name": "{{zcatProp.header.right.help.callback.name}}"
                      }                     
                    }                  
                  '
          >
          </zcat-button>
          <%}%>
        </div>
      </div>
      <%if(zcatProp.header.tabsPrimary){%>
      <div class="zcat-subheader-tabs">
        <% zcatProp.header.tabsPrimary.list.forEach((item, index) => { %>
        <go-to
          lt-prop-route="{{item.route}}"
          lt-prop-dp="{{item.dynamicParams}}"
          lt-prop-qp="{{item.queryParams}}"
          lt-prop-class="zcat-link zcat-text-12"
          lt-prop-custom=""
          data-value="{{item.value}}"
          onclick="{{action('tabClick', item, item.callback.name, zcatProp.tabsPrimary.level)}}"
        >
          <a 
            data-zcqa="{{item.zcqa}}-{{index}}"
            data-name="{{item.value}}"
            data-group="lv_{{zcatProp.header.tabsPrimary.level}}"
            >{{item.label}}</a
          >
        </go-to>
        <%}) %>
      </div>
      <%}%>
      <!-- new  -->
      <!-- <%if(zcatProp.header.tabsPrimary){%>
            <div class="zcat-subheader-tabs">
              <% zcatProp.header.tabsPrimary.list.forEach((item, index) => { %>
              <go-to
                lt-prop-route="{{item.route}}"
                lt-prop-dp="{{item.dynamicParams}}"
                lt-prop-qp="{{item.queryParams}}"
                lt-prop-class="zcat-link zcat-text-12"
                lt-prop-custom=""
                onclick="{{action('tabClick', item, item.route, zcatProp.header.tabsPrimary.callback.name, 
                zcatProp.header.tabsPrimary.level)}}"
              >
                <a
                data-name="{{item.value}}" data-zcqa="{{item.zcqa}}" 
                data-group="lv_{{zcatProp.header.tabsPrimary.level}}" data-zcqa="{{item.value}}"
                  >{{item.label}}</a
                >
              </go-to>
              <%}) %>
            </div>
            <%}%> -->
    </div>

    <div
      class="zcat-outer-layout {{zcatProp.pageScroll ? '' : 'zcat-oA'}} {{zcatProp.header.tabsPrimary.list.length > 0 ? 'zcat-primary-tab-present' : ''}} 
          {{zcatProp.header.tabsSecondary.list.length > 0 ? 'zcat-secondary-tab-present' : ''}}
          "
    >
      <div class="zcat-inner-layout">
        <lyte-yield yield-name="yield"></lyte-yield>
      </div>
    </div>
  </div>

</template>
