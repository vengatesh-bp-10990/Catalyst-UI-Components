<template tag-name="input-comp">
    <topbar-comp head-title="{{compHead}}" head-desc="{{compDesc}}"></topbar-comp>

    <div class="zcat-right-panel-wraper">
        <lyte-tabs class="primary-tabs"> 
            <template is="registerYield" yield-name="tabYield">
              <lyte-tab-head>
                <lyte-tab-title lyte-for="{{headTab}} as item index" lt-prop-id="zcat_comp_{{item.id}}"> {{item.name}} </lyte-tab-title>
              </lyte-tab-head>
              <lyte-tab-body>
                <lyte-tab-content lyte-for="{{headTab}} as item index" id="zcat_comp_{{item.id}}">
                    <div id="zcat-{{item.id}}-body-wraper" >
                        <div lyte-if="{{item.id === 'custom'}}" class="zcat-dF zcat-right-panel-cont">
                            <div class="zcat-p-24 zcat-dF zcat-gap-20 zcat-direction-column zcat-prev-container {{customDetailsHide ? '' : 'zcat_nocustom_details'}}">
                                <h2 class="zcat-text-16 zcat-color-dark1 zcat-pt-10 zcat-font-500">preview</h2>
                                <div class="zcat-prev-wraper">    
                                    <div class="zcat-prev-demo-img">   
                                      <zcat-input self="{{self}}" zcat-prop="{{inputObj}}" record="{{employeeDetails}}" key="{{name}}">
                                      <!-- <zcat-input self="{{self}}" zcat-prop="{{inputObj}}" record="{{inputObj.employeeDetails}}" key="{{name}}"> -->
                                      </zcat-input>  
                                        
                                    </div>

                                    <div class="zcat-p-20">
                                        <lyte-tabs class="secondary-tabs zcat-prev-code-tab">
                                            <template is="registerYield" yield-name="tabYield">
                                              <lyte-tab-head>
                                                <lyte-tab-title lt-prop-id="zcat_code_html"> Html </lyte-tab-title>
                                                <lyte-tab-title lt-prop-id="zcat_code_js"> JS </lyte-tab-title>
                                              </lyte-tab-head>
                                              <lyte-tab-body>
                                                        <lyte-tab-content id="zcat_code_html">
                                                            <zcat-code-snippet zcat-prop = "{{htmlCodeSnippet}}" self = "{{self}}">
                                                            </zcat-code-snippet>
                                                        </lyte-tab-content>
                                                        <lyte-tab-content id="zcat_code_js">
                                                            <zcat-code-snippet zcat-prop = "{{jsCodeSnippet}}" self = "{{self}}">
                                                            </zcat-code-snippet>
                                                        </lyte-tab-content>
                                              </lyte-tab-body>
                                            </template>
                                        </lyte-tabs>
                                    </div>
                                </div>
                            </div>


                            <!-- Need to use the below options later  -->
                            <div class="zcat-custom-wraper {{customDetailsHide ? '' : 'zcat-dN'}}" data-name="{{customDetailsHide}}">
                              
                                <!-- New  -->
                                <div class="custom-row-wrapper zcat-justify-between zcat-pb-24">
                                  <h2 class="zcat-text-16 zcat-color-dark1 zcat-font-500">Customise</h2>
                                  <zcat-button self="{{self}}" zcat-prop="{{resetButtonObj}}"></zcat-button>
                                </div>                        
                                <div class="zcat-dF zcat-direction-column zcat-gap-20">
                                  <div class="custom-row-wrapper">
                                    <h3 class="custom-row-header">Variant</h3>
                                    <lyte-dropdown lt-prop-class="custom-row-options" lt-prop-selected="{{selectedVariant}}" lt-prop-freeze="false"
                                      on-option-selected="{{method('changeInputType')}}" lt-prop-button-class="lyteSm"
                                      class="custom-dropdown-width"
                                      lt-prop-disabled-list="{{disabledOptionForRightIcon}}"
                                    >
                                        <template is="registerYield" yield-name="yield">
                                          <lyte-drop-box>
                                            <lyte-drop-body>
                                              <lyte-drop-item data-value="text">Text</lyte-drop-item>
                                              <lyte-drop-item data-value="textarea">Textarea </lyte-drop-item>
                                            </lyte-drop-body>
                                          </lyte-drop-box>
                                        </template>
                                    </lyte-dropdown> 
  
                                  </div>
                                  <div class="custom-row-wrapper">
                                    <h3 class="custom-row-header">Size</h3>
                                    <lyte-dropdown lt-prop-class="custom-row-options" lt-prop-selected="{{selectedSize}}" lt-prop-freeze="false"
                                      on-option-selected="{{method('changeInputSize')}}" lt-prop-button-class="lyteSm"
                                      class="custom-dropdown-width"
                                    >
                                        <template is="registerYield" yield-name="yield">
                                          <lyte-drop-box>
                                            <lyte-drop-body>
                                              <lyte-drop-item data-value="default">Default</lyte-drop-item>
                                              <lyte-drop-item data-value="small">Small</lyte-drop-item>
                                              <lyte-drop-item data-value="extra-small">Extra-small</lyte-drop-item>
                                            </lyte-drop-body>
                                          </lyte-drop-box>
                                        </template>
                                    </lyte-dropdown>
                                  </div>
                                  <div class="custom-row-wrapper">
                                    <h3 class="custom-row-header">Label</h3>
                                    <lyte-checkbox
                                        lt-prop-value="1"
                                        lt-prop-tabindex="0"
                                        lt-prop-type="switch"
                                        on-checked="{{method('labelChecked')}}"
                                        on-unchecked="{{method('labelUnchecked')}}"
                                        lt-prop-checked="{{labelInitialState}}"
                                        class="custom-dropdown-width"
                                    ></lyte-checkbox>
                                  </div>
                                  <div class="custom-row-wrapper" lyte-if="{{isLabelEnabled}}">
                                    <h3 class="custom-row-header">Label with Info Icon</h3>
                                    <lyte-checkbox
                                        lt-prop-value="1"
                                        lt-prop-tabindex="0"
                                        lt-prop-type="switch"
                                        on-checked="{{method('labelInfoChecked')}}"
                                        on-unchecked="{{method('labelInfoUnchecked')}}"
                                        lt-prop-checked="{{labelInfoIconInitialState}}"
                                        class="custom-dropdown-width"
                                    ></lyte-checkbox>
                                  </div>
                                  <div class="custom-row-wrapper" lyte-if="{{isTooltipPlacementEnabled && isLabelEnabled}}">
                                    <h3 class="custom-row-header">Tooltip Placement</h3>
                                    <lyte-dropdown lt-prop-class="custom-row-options" lt-prop-selected="{{selectedTooltipPlacement}}" lt-prop-freeze="false"
                                      on-option-selected="{{method('changeTooltipPlacement')}}" lt-prop-button-class="lyteSm"
                                      class="custom-dropdown-width"
                                    >
                                        <template is="registerYield" yield-name="yield">
                                          <lyte-drop-box>
                                            <lyte-drop-body>
                                              <lyte-drop-item data-value="auto">Auto</lyte-drop-item>
                                              <lyte-drop-item data-value="top">Top</lyte-drop-item>
                                              <lyte-drop-item data-value="bottom">Bottom</lyte-drop-item>
                                              <lyte-drop-item data-value="left">Left</lyte-drop-item>
                                              <lyte-drop-item data-value="right">Right</lyte-drop-item>
                                            </lyte-drop-body>
                                          </lyte-drop-box>
                                        </template>
                                    </lyte-dropdown>
                                  </div>
                                  <div class="custom-row-wrapper">
                                    <h3 class="custom-row-header">Icon Left</h3>
                                    <lyte-checkbox
                                        lt-prop-value="1"
                                        lt-prop-tabindex="0"
                                        lt-prop-type="switch"
                                        on-checked="{{method('iconLeftChecked')}}"
                                        on-unchecked="{{method('iconLeftUnchecked')}}"
                                        lt-prop-checked="{{iconLeftInitialState}}"
                                        class="custom-dropdown-width"
                                    ></lyte-checkbox>
                                  </div>
                                  <div class="custom-row-wrapper" lyte-if="{{isIconLeftEnabled}}">
                                    <h3 class="custom-row-header">Change Icon</h3>
                                    <lyte-dropdown lt-prop-class="custom-row-options" lt-prop-selected="" lt-prop-freeze="false"
                                      on-option-selected="{{method('selectInputIcon')}}" lt-prop-button-class="lyteSm"
                                    >
                                        <template is="registerYield" yield-name="yield">
                                          <lyte-drop-box>
                                            <lyte-drop-body>
                                              <lyte-drop-item data-value="plus">Plus</lyte-drop-item>
                                              <lyte-drop-item data-value="minus">minus</lyte-drop-item>
                                              <lyte-drop-item data-value="edit">Edit</lyte-drop-item>
                                              <lyte-drop-item data-value="delete">Delete</lyte-drop-item>
                                              <lyte-drop-item data-value="upArrow">upArrow</lyte-drop-item>
                                              <lyte-drop-item data-value="leftArrow">leftArrow</lyte-drop-item>
                                              <lyte-drop-item data-value="rightArrow">rightArrow</lyte-drop-item>
                                              <lyte-drop-item data-value="copy">copy</lyte-drop-item>
                                              <lyte-drop-item data-value="search">search</lyte-drop-item>
                                            </lyte-drop-body>
                                          </lyte-drop-box>
                                        </template>
                                    </lyte-dropdown>
                                  </div>
                                  <div class="custom-row-wrapper">
                                    <h3 class="custom-row-header">Icon Right</h3>
                                    <lyte-checkbox
                                        lt-prop-value="1"
                                        lt-prop-tabindex="0"
                                        lt-prop-type="switch"
                                        on-checked="{{method('iconRightChecked')}}"
                                        on-unchecked="{{method('iconRightUnchecked')}}"
                                        lt-prop-checked="{{iconRightInitialState}}"
                                        lt-prop-disabled="{{rightIconSwitchDisable}}"
                                        class="custom-dropdown-width"
                                    ></lyte-checkbox>
                                  </div>
                                  <div class="custom-row-wrapper" lyte-if="{{isIconRightEnabled}}">
                                    <h3 class="custom-row-header">Change Icon</h3>
                                    <lyte-dropdown lt-prop-class="custom-row-options" lt-prop-selected="" lt-prop-freeze="false"
                                      on-option-selected="{{method('selectInputIcon')}}" lt-prop-button-class="lyteSm"
                                    >
                                        <template is="registerYield" yield-name="yield">
                                          <lyte-drop-box>
                                            <lyte-drop-body>
                                              <lyte-drop-item data-value="plus">Plus</lyte-drop-item>
                                              <lyte-drop-item data-value="minus">minus</lyte-drop-item>
                                              <lyte-drop-item data-value="edit">Edit</lyte-drop-item>
                                              <lyte-drop-item data-value="delete">Delete</lyte-drop-item>
                                              <lyte-drop-item data-value="upArrow">upArrow</lyte-drop-item>
                                              <lyte-drop-item data-value="leftArrow">leftArrow</lyte-drop-item>
                                              <lyte-drop-item data-value="rightArrow">rightArrow</lyte-drop-item>
                                              <lyte-drop-item data-value="copy">copy</lyte-drop-item>
                                              <lyte-drop-item data-value="search">search</lyte-drop-item>
                                            </lyte-drop-body>
                                          </lyte-drop-box>
                                        </template>
                                    </lyte-dropdown>
                                  </div>
                                  <div class="custom-row-wrapper">
                                    <h3 class="custom-row-header">Optional</h3>
                                    <lyte-checkbox
                                        lt-prop-value="1"
                                        lt-prop-tabindex="0"
                                        lt-prop-type="switch"
                                        on-checked="{{method('optionalChecked')}}"
                                        on-unchecked="{{method('optionalUnchecked')}}"
                                        lt-prop-checked="{{isOptionalEnabled}}"
                                        class="custom-dropdown-width"
                                    ></lyte-checkbox>
                                  </div>
                                  <div class="custom-row-wrapper">
                                    <h3 class="custom-row-header">Input State</h3>
                                    <lyte-dropdown lt-prop-class="custom-row-options" lt-prop-selected="{{selectedInitialState}}" lt-prop-freeze="false"
                                      on-option-selected="{{method('changeInputState')}}" lt-prop-button-class="lyteSm"
                                      class="custom-dropdown-width"
                                      lt-prop-disabled-list="{{disabledOptionForShowError}}"
                                    >
                                        <template is="registerYield" yield-name="yield">
                                          <lyte-drop-box>
                                            <lyte-drop-body>
                                              <lyte-drop-item data-value="default">Default</lyte-drop-item>
                                              <lyte-drop-item data-value="disabled">Disabled</lyte-drop-item>
                                            </lyte-drop-body>
                                          </lyte-drop-box>
                                        </template>
                                    </lyte-dropdown>
                                  </div>
                                  <div class="custom-row-wrapper">
                                    <h3 class="custom-row-header">Show Error</h3>
                                    <lyte-checkbox
                                        lt-prop-value="1"
                                        lt-prop-tabindex="0"
                                        lt-prop-type="switch"
                                        on-checked="{{method('showErrorChecked')}}"
                                        on-unchecked="{{method('showErrorUnchecked')}}"
                                        lt-prop-checked="{{showErrorInitialState}}"
                                        lt-prop-disabled="{{showErrorSwitchDisable}}"
                                        class="custom-dropdown-width"
                                    ></lyte-checkbox>
                                  </div>
  
  
                                </div>


                            </div>
                        </div>
                        <change-logs-comp lyte-if="{{item.id === 'change_logs'}}"></change-logs-comp>
                    </div>
                </lyte-tab-content>
              </lyte-tab-body>
            </template>
        </lyte-tabs>
    </div>


</template>
